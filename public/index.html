<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmovi iz CSV</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>

    <h1>Popis filmova (CSV)</h1>

    <table border="1" id="filmovi-tablica">
        <thead>
            <tr>
                <th>Naslov</th>
                <th>Žanr</th>
                <th>Godina</th>
                <th>Trajanje</th>
                <th>Ocjena</th>
                <th>Redatelj</th>
                <th>Zemlja</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <script>
        Papa.parse("filmovi.csv", {
            download: true,
            header: true,
            complete: function(results) {
                const tbody = document.querySelector("#filmovi-tablica tbody");

                results.data.forEach(film => {
                    const row = document.createElement("tr");

                    row.innerHTML = `
                        <td>${film.Naslov}</td>
                        <td>${film.Žanr}</td>
                        <td>${film.Godina}</td>
                        <td>${film["Trajanje (min)"]}</td>
                        <td>${film.Ocjena}</td>
                        <td>${film.Redatelj}</td>
                        <td>${film.Zemlja}</td>
                    `;

                    tbody.appendChild(row);
                });
            }
        });
    </script>

</body>
</html>
